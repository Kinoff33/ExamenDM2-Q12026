<ion-header class="page-header">
  <ion-toolbar>
    <ion-title>Inicio</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="home-content">
  <section class="home-card">
    <div *ngIf="imageUrl" class="preview-card preview-card-top">
      <img [src]="imageUrl" alt="Imagen seleccionada por el usuario" />
    </div>

    <div class="composer-area">
      <ion-textarea
        class="thought-input"
        [value]="thoughtPrompt"
        [readonly]="true"
        [autoGrow]="true"
      ></ion-textarea>

      <div class="action-row">
        <ion-button class="action-button" fill="solid" (click)="selectImage()">
          <ion-icon slot="icon-only" name="image-outline"></ion-icon>
        </ion-button>

        <ion-button class="action-button" fill="solid" (click)="loadCurrentLocation()">
          <ion-icon slot="icon-only" name="location-sharp"></ion-icon>
        </ion-button>
      </div>

      <input
        #imagePicker
        class="hidden-input"
        type="file"
        accept="image/*"
        (change)="onFileSelected($event)"
      />

      <p *ngIf="locationLabel" class="location-text">{{ locationLabel }}</p>
    </div>
  </section>
</ion-content>
